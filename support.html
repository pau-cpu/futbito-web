<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbito — Soporte</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #ccc; font-family: 'DM Sans', sans-serif; line-height: 1.7; }
        .container { max-width: 640px; margin: 0 auto; padding: 60px 24px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
        a.back { color: #888; text-decoration: none; font-size: 14px; position: absolute; top: 24px; left: 24px; }
        a.back:hover { color: #fff; }
        h1 { color: #f5f5f5; font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; }
        p { font-size: 16px; color: #888; max-width: 400px; }
        a.email { color: #f5f5f5; text-decoration: none; font-size: 20px; font-weight: 700; padding: 16px 40px; border: 2px solid #333; border-radius: 8px; transition: all 0.2s; }
        a.email:hover { border-color: #f5f5f5; }
        .footer { position: absolute; bottom: 24px; font-size: 13px; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/">← Futbito</a>
        <h1>SOPORTE</h1>
        <p>¿Tienes algún problema o sugerencia? Escríbenos y te responderemos lo antes posible.</p>
        <a class="email" href="mailto:hola@futbito.app">hola@futbito.app</a>
        <div class="footer">© 2026 Futbito. Girona, Catalunya.</div>
    </div>
</body>
</html>
